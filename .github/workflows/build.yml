name: Build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v1.3.1
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: pypi-publish-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        run: |
          tag="${{ github.event.release.tag_name || inputs.tag }}"
          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v1.2.3 or v1.2.3-beta.1" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"

      - name: Verify tag matches package version
        run: |
          package_version="$(python - <<'PY'
          about = {}
          with open("autocrop/__version__.py", encoding="utf-8") as version_file:
              exec(version_file.read(), about)
          print(about["__version__"])
          PY
          )"
          if [ "v$package_version" != "${{ steps.release.outputs.tag }}" ]; then
            echo "Tag ${{ steps.release.outputs.tag }} does not match package version v$package_version" >&2
            exit 1
          fi

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
