---
name: CI

on:
  push:
    branches: master
  pull_request:

jobs:
  test:
    env:
      LC_ALL: C
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: |
            requirements*.txt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r requirements-dev.txt -e .

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Run linters
        run: just lint

      - name: Run tests
        run: |
          uv run pytest --cov autocrop -v --cov-report term-missing
          uv run codecov
